`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors Game</title>
</head>

<body>

<div class="container">

    <h1>🎮 Rock Paper Scissors Game</h1>

    <div class="buttons">
        <button class="rock" onclick="playGame('rock')">
            🪨 Rock
        </button>

        <button class="paper" onclick="playGame('paper')">
            📄 Paper
        </button>

        <button class="scissors" onclick="playGame('scissors')">
            ✂️ Scissors
        </button>
    </div>

    <div id="result">
        Start Playing!
    </div>

    <div class="stats">

        <p id="currentScore"></p>
        <p id="highScore"></p>
        <p id="wins"></p>
        <p id="losses"></p>
        <p id="draws"></p>
        <p id="matches"></p>
        <p id="winPercentage"></p>

    </div>

    <br>

    <button class="reset" onclick="resetScore()">
        🔄 Reset Score
    </button>

</div>

<script>

let gameStats =
JSON.parse(localStorage.getItem('gameStats')) || {

    currentScore:0,
    highScore:0,
    wins:0,
    losses:0,
    draws:0,
    totalMatches:0

};

updateScreen();

function playGame(playerMove){

    const computerMove = pickComputerMove();

    let result = '';

    if(playerMove === 'rock'){

        if(computerMove === 'rock'){
            result = 'Draw';
        }
        else if(computerMove === 'paper'){
            result = 'Lose';
        }
        else{
            result = 'Win';
        }

    }
    else if(playerMove === 'paper'){

        if(computerMove === 'rock'){
            result = 'Win';
        }
        else if(computerMove === 'paper'){
            result = 'Draw';
        }
        else{
            result = 'Lose';
        }

    }
    else{

        if(computerMove === 'rock'){
            result = 'Lose';
        }
        else if(computerMove === 'paper'){
            result = 'Win';
        }
        else{
            result = 'Draw';
        }

    }

    gameStats.totalMatches++;

    if(result === 'Win'){
        gameStats.currentScore++;
        gameStats.wins++;
    }
    else if(result === 'Lose'){
        gameStats.losses++;
    }
    else{
        gameStats.draws++;
    }

    if(gameStats.currentScore > gameStats.highScore){
        gameStats.highScore = gameStats.currentScore;
    }

    localStorage.setItem(
        'gameStats',
        JSON.stringify(gameStats)
    );

    document.getElementById('result').innerHTML =
    `You: ${playerMove} | Computer: ${computerMove} | Result: ${result}`;

    updateScreen();
}

function pickComputerMove(){

    const randomNumber = Math.random();

    if(randomNumber < 1/3){
        return 'rock';
    }
    else if(randomNumber < 2/3){
        return 'paper';
    }
    else{
        return 'scissors';
    }
}

function updateScreen(){

    document.getElementById('currentScore').innerHTML =
    'Current Score: ' + gameStats.currentScore;

    document.getElementById('highScore').innerHTML =
    'High Score: ' + gameStats.highScore;

    document.getElementById('wins').innerHTML =
    'Wins: ' + gameStats.wins;

    document.getElementById('losses').innerHTML =
    'Losses: ' + gameStats.losses;

    document.getElementById('draws').innerHTML =
    'Draws: ' + gameStats.draws;

    document.getElementById('matches').innerHTML =
    'Total Matches: ' + gameStats.totalMatches;

    let percentage = 0;

    if(gameStats.totalMatches > 0){
        percentage =
        (gameStats.wins / gameStats.totalMatches) * 100;
    }

    document.getElementById('winPercentage').innerHTML =
    'Win Percentage: ' +
    percentage.toFixed(2) + '%';
}

function resetScore(){

    localStorage.removeItem('gameStats');

    gameStats = {

        currentScore:0,
        highScore:0,
        wins:0,
        losses:0,
        draws:0,
        totalMatches:0

    };

    updateScreen();

    document.getElementById('result').innerHTML =
    'Start Playing!';

    alert('Score Reset Successfully!');
}

</script>

</body>
</html>
